# ==============================================================================
# Workflow: Автоматическое обновление архива с промптами
# ==============================================================================
# Этот скрипт автоматически упаковывает все файлы из папки 'prompts' в архив
# и обновляет стабильный релиз 'latest-prompts'.
#
# Особенности:
# - Использует идемпотентный метод обновления релиза (файл всегда перезаписывается).
# - Не требует внешних API-ключей (безопасность на основе GITHUB_TOKEN).
# - Соответствует требованиям безопасности GitHub (использование актуальных версий Actions).
# ==============================================================================

name: Update Prompts Library

# Определяем триггеры запуска
on:
  push:
    branches:
      - main
    paths:
      - 'prompts/**' # Запуск только при изменении файлов в нужной папке
  workflow_dispatch:  # Возможность ручного запуска из интерфейса GitHub

# Устанавливаем права доступа: необходимы для создания/обновления релизов
permissions:
  contents: write

jobs:
  package_and_release:
    name: Package and Update Prompts Archive
    runs-on: ubuntu-latest # Используем стандартный образ Ubuntu

    steps:
      # Шаг 1: Клонирование репозитория
      # Используем v4 для соответствия требованиям Node.js 24+
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Упаковка промптов в ZIP
      # Команда -r обеспечивает рекурсивный поиск всех вложенных папок внутри ./prompts
      - name: Archive prompts directory
        run: zip -r prompts.zip ./prompts

      # Шаг 3: Обновление (или создание) релиза
      # Параметры:
      # - tag_name: "latest-prompts" - стабильный тег для "живого" релиза
      # - make_latest: true - помечает данный релиз как "Latest" в интерфейсе GitHub
      # - files: prompts.zip - автоматически прикрепляет созданный архив к релизу
      - name: Update Release with Prompts Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-prompts
          name: "Prompts Library (Latest)"
          body: "Автоматически обновляемая библиотека промптов. Этот релиз всегда содержит самую свежую версию из ветки main."
          draft: false
          prerelease: false
          make_latest: true
          files: prompts.zip
        env:
          # Автоматически генерируемый токен с правами, заданными в секции permissions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}